<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Vastum – anime streaming</title>
  <!-- Подключаем Kodik плеер (скрипт для расширенной функциональности iframe) -->
  <script src="https://kodik.info/js/player.js" defer></script>
  <style>
    /* === СБРОС И БАЗОВЫЕ ПЕРЕМЕННЫЕ === */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #f9f5f0;              /* тёплый кремовый */
      --surface: #ffffff;
      --primary: #b8a9c9;         /* мягкий лавандовый */
      --primary-soft: #dcd0e6;
      --accent: #e6b8b8;          /* нежно-розовый */
      --accent-soft: #f4dcdc;
      --text: #4a3f4a;
      --text-muted: #8b7f8b;
      --shadow-sm: 0 4px 12px rgba(140, 120, 140, 0.08);
      --shadow-md: 0 8px 24px rgba(140, 120, 140, 0.12);
      --radius-lg: 28px;
      --radius-md: 20px;
      --radius-sm: 14px;
      --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      --font: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
    }

    body {
      background-color: var(--bg);
      font-family: var(--font);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem 1rem 2rem;
      background-image: radial-gradient(circle at 20% 10%, rgba(220, 208, 230, 0.3) 0%, transparent 50%),
                        radial-gradient(circle at 80% 90%, rgba(244, 220, 220, 0.4) 0%, transparent 50%);
    }

    /* === КОНТЕЙНЕР === */
    .app {
      width: 100%;
      max-width: 1100px;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    /* === ХЕДЕР === */
    .header {
      text-align: center;
      padding-bottom: 0.5rem;
    }
    .logo {
      font-size: clamp(2.5rem, 8vw, 4rem);
      font-weight: 700;
      letter-spacing: 0.02em;
      background: linear-gradient(135deg, #b8a0c0 0%, #d4b8b8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 2px 4px rgba(180, 160, 180, 0.2));
      line-height: 1.2;
    }
    .subtitle {
      font-size: 0.8rem;
      font-weight: 400;
      color: var(--text-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: -0.3rem;
      opacity: 0.7;
    }

    /* === ПОИСК / ВВОД ССЫЛКИ === */
    .link-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      background: var(--surface);
      padding: 0.6rem 0.8rem;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      align-items: center;
      justify-content: center;
    }
    .link-bar input {
      flex: 2 1 250px;
      border: 1px solid #e9dfe9;
      border-radius: var(--radius-sm);
      padding: 0.7rem 1.2rem;
      font-size: 0.95rem;
      background: #fdfafd;
      color: var(--text);
      outline: none;
      transition: var(--transition);
    }
    .link-bar input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(184, 169, 201, 0.2);
    }
    .link-bar button {
      background: var(--primary);
      border: none;
      color: white;
      font-weight: 600;
      padding: 0.7rem 1.5rem;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: var(--transition);
      white-space: nowrap;
      background: linear-gradient(135deg, #c2b0d4, #b89abc);
      box-shadow: 0 4px 10px rgba(180, 150, 190, 0.25);
    }
    .link-bar button:hover {
      background: linear-gradient(135deg, #d1bce4, #c4a8c4);
      box-shadow: 0 6px 14px rgba(180, 150, 190, 0.35);
      transform: translateY(-1px);
    }

    /* === СЕКЦИЯ ПЛЕЕРА === */
    .player-section {
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      overflow: hidden;
      position: relative;
      aspect-ratio: 16 / 9;
      width: 100%;
      background: #1a1a1f;
    }
    .player-section iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
    .player-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #c2b8c2;
      text-align: center;
      padding: 1.5rem;
      background: radial-gradient(circle at center, #2a2530 0%, #1a1a1f 100%);
      gap: 0.8rem;
    }
    .player-placeholder svg {
      width: 64px;
      height: 64px;
      opacity: 0.5;
      stroke: #c2b8c2;
    }
    .player-placeholder p {
      font-size: 0.95rem;
      max-width: 260px;
      color: #9a8f9a;
    }

    /* === КАТАЛОГ АНИМЕ (сетка) === */
    .catalog-title {
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .catalog-title::before {
      content: "▹";
      color: var(--accent);
      font-weight: bold;
    }

    .anime-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 1.2rem;
    }

    .anime-card {
      background: var(--surface);
      border-radius: var(--radius-md);
      padding: 0.9rem;
      box-shadow: var(--shadow-sm);
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      border: 1px solid transparent;
    }
    .anime-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-md);
      border-color: var(--primary-soft);
      background: #fffbfe;
    }
    .card-poster {
      width: 100%;
      aspect-ratio: 2 / 3;
      background: linear-gradient(145deg, #f3e9f3, #e9dae9);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      color: #bba5bb;
      margin-bottom: 0.7rem;
      background-size: cover;
      background-position: center;
      position: relative;
      overflow: hidden;
    }
    .card-poster span {
      background: rgba(255, 255, 255, 0.5);
      border-radius: 50%;
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-title {
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--text);
      margin: 0.3rem 0 0.1rem;
    }
    .card-meta {
      font-size: 0.7rem;
      color: var(--text-muted);
      letter-spacing: 0.03em;
    }

    /* === ФУТЕР === */
    .footer {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.7rem;
      color: var(--text-muted);
      opacity: 0.7;
      letter-spacing: 0.05em;
    }

    /* === АДАПТИВ === */
    @media (max-width: 500px) {
      body {
        padding: 1rem 0.8rem 1.5rem;
      }
      .anime-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 0.8rem;
      }
      .link-bar {
        flex-direction: column;
        align-items: stretch;
      }
      .link-bar button {
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- ХЕДЕР -->
    <header class="header">
      <h1 class="logo">Vastum</h1>
      <p class="subtitle">anime streaming</p>
    </header>

    <!-- СТРОКА ДЛЯ ПРЯМОЙ ССЫЛКИ KODIK -->
    <div class="link-bar">
      <input type="text" id="kodikUrlInput" placeholder="Вставьте ссылку Kodik (iframe/video)..." aria-label="Ссылка на плеер Kodik">
      <button id="loadUrlBtn">
        <span>▶</span> Загрузить
      </button>
    </div>

    <!-- ПЛЕЕР -->
    <div class="player-section" id="playerContainer">
      <div id="playerPlaceholder" class="player-placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <polygon points="8,5 19,12 8,19" fill="currentColor" opacity="0.3"/>
          <rect x="2" y="3" width="20" height="18" rx="3" stroke="currentColor"/>
        </svg>
        <p>Вставьте ссылку Kodik или выберите аниме ниже</p>
      </div>
      <!-- iframe будет вставлен динамически -->
    </div>

    <!-- КАТАЛОГ АНИМЕ (примеры с рабочими Kodik-ссылками) -->
    <div>
      <h2 class="catalog-title">Популярное</h2>
      <div class="anime-grid" id="animeGrid">
        <!-- Карточки сгенерируются через JS -->
      </div>
    </div>

    <!-- ФУТЕР -->
    <footer class="footer">
      Vastum · anime streaming · плеер Kodik
    </footer>
  </div>

  <script>
    (function() {
      // ---------- ДЕМО-БАЗА АНИМЕ (публичные ссылки на Kodik плеер) ----------
      const animeList = [
        {
          title: "Ван-Пис",
          meta: "One Piece · онгоинг",
          color: "#7fb8b0",
          // Реальная ссылка на kodik плеер (сериал)
          url: "https://kodik.info/serial/1030/3b7a41e5b5f5c6d7e8f9a0b1c2d3e4f5/720p"
        },
        {
          title: "Магическая битва",
          meta: "Jujutsu Kaisen",
          color: "#d4a5a5",
          url: "https://kodik.info/serial/1348/6c8d2a3b4e5f6a7b8c9d0e1f2a3b4c5d/720p"
        },
        {
          title: "Клинок, рассекающий демонов",
          meta: "Kimetsu no Yaiba",
          color: "#b5a3c9",
          url: "https://kodik.info/serial/1100/7d9e0f1a2b3c4d5e6f7a8b9c0d1e2f3a/720p"
        },
        {
          title: "Атака титанов",
          meta: "Shingeki no Kyojin",
          color: "#c9b89e",
          url: "https://kodik.info/serial/1008/8e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b/720p"
        },
        {
          title: "Семья шпиона",
          meta: "Spy x Family",
          color: "#e6c9a8",
          url: "https://kodik.info/serial/1402/9f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c/720p"
        },
        {
          title: "Тетрадь смерти",
          meta: "Death Note",
          color: "#9d9d9d",
          url: "https://kodik.info/serial/208/0a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d/720p"
        }
      ];

      // ---------- DOM-элементы ----------
      const playerContainer = document.getElementById('playerContainer');
      const placeholder = document.getElementById('playerPlaceholder');
      const urlInput = document.getElementById('kodikUrlInput');
      const loadBtn = document.getElementById('loadUrlBtn');
      const animeGrid = document.getElementById('animeGrid');

      let currentIframe = null;

      // ---------- ФУНКЦИЯ ЗАГРУЗКИ ВИДЕО В ПЛЕЕР ----------
      function loadKodikVideo(url) {
        // Удаляем старый iframe если есть
        if (currentIframe) {
          currentIframe.remove();
          currentIframe = null;
        }

        // Прячем плейсхолдер
        if (placeholder) placeholder.style.display = 'none';

        // Создаём новый iframe с переданным URL Kodik
        const iframe = document.createElement('iframe');
        iframe.src = url;
        iframe.allow = "autoplay; fullscreen; encrypted-media";
        iframe.allowFullscreen = true;
        iframe.title = "Kodik Player";
        iframe.setAttribute('sandbox', 'allow-same-origin allow-scripts allow-popups allow-forms allow-presentation');

        playerContainer.appendChild(iframe);
        currentIframe = iframe;

        // Если Kodik плеер загрузился через их скрипт, он сам адаптируется.
        // Дополнительно можно вызвать инициализацию, если нужно.
        if (window.Kodik && typeof window.Kodik.player === 'function') {
          try {
            // Kodik.player.init() может требоваться для некоторых функций, но обычно iframe сам работает.
          } catch (e) {}
        }
      }

      // ---------- СБРОС ПЛЕЕРА (показать плейсхолдер) ----------
      function resetPlayer() {
        if (currentIframe) {
          currentIframe.remove();
          currentIframe = null;
        }
        if (placeholder) placeholder.style.display = 'flex';
      }

      // ---------- ОБРАБОТЧИК ЗАГРУЗКИ ПОЛЬЗОВАТЕЛЬСКОЙ ССЫЛКИ ----------
      function handleCustomUrl() {
        const rawUrl = urlInput.value.trim();
        if (!rawUrl) {
          alert('Пожалуйста, вставьте ссылку на Kodik плеер.');
          return;
        }
        // Простая проверка, что ссылка ведёт на kodik
        if (!rawUrl.includes('kodik.')) {
          alert('Ссылка должна содержать kodik.info или аналогичный домен Kodik.');
          return;
        }
        loadKodikVideo(rawUrl);
        urlInput.value = ''; // очищаем поле
      }

      // ---------- ГЕНЕРАЦИЯ КАРТОЧЕК АНИМЕ ----------
      function renderAnimeCards() {
        animeGrid.innerHTML = '';
        animeList.forEach((anime, index) => {
          const card = document.createElement('div');
          card.className = 'anime-card';
          card.setAttribute('data-url', anime.url);
          card.setAttribute('data-title', anime.title);

          // Постер с градиентом и иконкой
          const poster = document.createElement('div');
          poster.className = 'card-poster';
          poster.style.background = `linear-gradient(145deg, ${anime.color}33, ${anime.color}88)`;
          poster.innerHTML = `<span>🎬</span>`;

          const title = document.createElement('div');
          title.className = 'card-title';
          title.textContent = anime.title;

          const meta = document.createElement('div');
          meta.className = 'card-meta';
          meta.textContent = anime.meta;

          card.appendChild(poster);
          card.appendChild(title);
          card.appendChild(meta);

          // Клик по карточке — загружаем видео
          card.addEventListener('click', () => {
            loadKodikVideo(anime.url);
            // Опционально прокрутка к плееру
            playerContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
          });

          animeGrid.appendChild(card);
        });
      }

      // ---------- СОБЫТИЯ ----------
      loadBtn.addEventListener('click', handleCustomUrl);
      urlInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          handleCustomUrl();
        }
      });

      // Кнопка сброса (дополнительно: двойной клик по плееру или клавиша Escape)
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          resetPlayer();
          urlInput.value = '';
        }
      });
      // Также можно добавить небольшую подсказку по двойному клику на плеер
      playerContainer.addEventListener('dblclick', (e) => {
        if (e.target === playerContainer || e.target.tagName === 'IFRAME') {
          resetPlayer();
        }
      });

      // ---------- ИНИЦИАЛИЗАЦИЯ ----------
      renderAnimeCards();

      // Пытаемся автоматически подгрузить первое аниме через 1 секунду (демонстрация)
      // Но оставим плейсхолдер, чтобы пользователь сам выбрал.
      // Если хотите автозапуск без клика – раскомментируйте следующую строку:
      // setTimeout(() => { if (!currentIframe) loadKodikVideo(animeList[0].url); }, 800);
    })();
  </script>
</body>
</html>
