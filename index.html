<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>Vastum – anime streaming</title>
  <!-- Официальный скрипт плеера Kodik -->
  <script src="https://kodik.info/js/player.js" defer></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #1a1a1f;
      --surface: #23232b;
      --surface-light: #2e2e38;
      --primary: #b8a9c9;
      --accent: #d9565c;
      --accent-glow: #f08484;
      --text: #f0eaf5;
      --text-muted: #9f95a8;
      --shadow-lg: 0 12px 32px rgba(0,0,0,0.6);
      --radius-xl: 30px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --transition: 0.25s cubic-bezier(0.2, 0, 0.3, 1);
      --font: 'Segoe UI', 'Inter', system-ui, sans-serif;
    }

    body {
      background: var(--bg);
      font-family: var(--font);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 0 1rem 1rem;
      background-image: radial-gradient(circle at 10% 10%, rgba(217,86,92,0.1) 0%, transparent 40%),
      radial-gradient(circle at 90% 80%, rgba(184,169,201,0.1) 0%, transparent 50%);
    }

    .app {
      max-width: 1300px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1.8rem;
      position: relative;
    }

    /* Шапка с бургером */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--surface);
      padding: 0.8rem 1.8rem;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      margin-top: 1rem;
      position: relative;
      z-index: 1000;
    }
    .logo {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #d4a0a0, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.02em;
      cursor: pointer;
    }
    .burger-menu {
      position: relative;
    }
    .burger-icon {
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 2rem;
      padding: 0.3rem 0.7rem;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: var(--transition);
    }
    .burger-icon:hover {
      background: var(--surface-light);
      color: var(--accent-glow);
    }
    .menu-panel {
      position: absolute;
      top: 3.8rem;
      right: 0;
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: 1.2rem;
      min-width: 200px;
      box-shadow: var(--shadow-lg);
      display: none;
      flex-direction: column;
      gap: 0.6rem;
      backdrop-filter: blur(8px);
      z-index: 100;
    }
    .menu-panel.active {
      display: flex;
    }
    .menu-panel a {
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 500;
      padding: 0.6rem 1rem;
      border-radius: var(--radius-sm);
      transition: var(--transition);
    }
    .menu-panel a:hover {
      background: var(--surface-light);
      color: var(--accent-glow);
    }

    .subtitle {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      text-align: center;
      margin-top: -1rem;
      opacity: 0.8;
    }

    /* Поле поиска */
    .search-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      background: var(--surface);
      padding: 0.7rem 1rem;
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      align-items: center;
    }
    .search-bar input {
      flex: 2 1 250px;
      background: #1e1e26;
      border: 1px solid #3a3344;
      border-radius: var(--radius-md);
      padding: 0.7rem 1.2rem;
      font-size: 0.95rem;
      color: var(--text);
      outline: none;
      transition: var(--transition);
    }
    .search-bar input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(217,86,92,0.3);
    }
    .search-bar button {
      background: linear-gradient(135deg, #b04d4d, var(--accent));
      border: none;
      color: white;
      font-weight: 600;
      padding: 0.7rem 1.6rem;
      border-radius: var(--radius-md);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: var(--transition);
      box-shadow: 0 4px 12px rgba(217,86,92,0.5);
    }
    .search-bar button:hover {
      background: linear-gradient(135deg, #c26767, #e87a7a);
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(217,86,92,0.6);
    }

    /* Плеер */
    .player-section {
      background: #101014;
      border-radius: var(--radius-xl);
      overflow: hidden;
      aspect-ratio: 16 / 9;
      width: 100%;
      box-shadow: var(--shadow-lg), 0 0 0 1px rgba(217,86,92,0.3);
    }
    .player-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #e0b3b3;
      text-align: center;
      gap: 1rem;
      background: radial-gradient(circle at center, #2a2530 0%, #101014 100%);
    }

    /* Сетка с карточками */
    .catalog-title {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }
    .catalog-title::before {
      content: "▹";
      color: var(--accent);
      font-weight: bold;
    }
    .anime-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1.3rem;
    }

    .anime-card {
      background: var(--surface-light);
      border-radius: var(--radius-lg);
      padding: 0.8rem;
      box-shadow: 0 6px 16px rgba(0,0,0,0.5);
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      border: 1px solid transparent;
      animation: fadeSlideIn 0.5s ease forwards;
      opacity: 0;
      transform: translateY(25px);
    }
    .anime-card:hover {
      transform: translateY(-6px);
      border-color: var(--accent);
      background: #322d37;
    }
    @keyframes fadeSlideIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .card-poster {
      width: 100%;
      aspect-ratio: 2/3;
      background: #2b2733;
      border-radius: var(--radius-sm);
      margin-bottom: 0.7rem;
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      color: #7a5b5b;
    }
    .card-title {
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--text);
    }
    .card-meta {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 0.2rem;
    }

    .footer {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.7rem;
      color: var(--text-muted);
      opacity: 0.7;
    }

    /* Адаптив */
    @media (max-width: 600px) {
      .anime-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 0.8rem;
      }
      .top-bar {
        padding: 0.8rem 1rem;
      }
      .search-bar {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
<div class="app">
  <!-- Шапка с бургер-меню -->
  <div class="top-bar">
    <div class="logo" onclick="location.reload()">Vastum</div>
    <div class="burger-menu">
      <button class="burger-icon" id="burgerToggle">☰</button>
      <div class="menu-panel" id="menuPanel">
        <a href="#" onclick="randomAnime()">Случайное аниме</a>
        <a href="#" onclick="document.getElementById('searchInput').focus()">Поиск</a>
        <a href="https://anixart.tv" target="_blank">Anixart (пример)</a>
        <a href="#" onclick="resetPlayer()">Остановить плеер</a>
      </div>
    </div>
  </div>
  <div class="subtitle">anime streaming</div>

  <!-- Поисковая строка (единственное, что нужно для просмотра) -->
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Введите название аниме (рус. озвучка)...">
    <button id="searchBtn">🔍 Найти и смотреть</button>
  </div>

  <!-- Плеер Kodik -->
  <div class="player-section" id="playerContainer">
    <div id="playerPlaceholder" class="player-placeholder">
      <span style="font-size:2.5rem;">🎬</span>
      <p>Введите название аниме в поиске<br>или выберите из карточек ниже</p>
    </div>
  </div>

  <!-- Сетка с карточками (обновляется сама) -->
  <div>
    <h2 class="catalog-title">Всякое разное · без сортировки</h2>
    <div class="anime-grid" id="animeGrid"></div>
  </div>

  <footer class="footer">Vastum · плеер Kodik · данные из открытых API</footer>
</div>

<script>
  (function() {
    // ---------- API (открытые, без ключей) ----------
    // Используем Shikimori API для получения случайных/популярных тайтлов
    const SHIKIMORI_API = 'https://shikimori.one/api/animes?order=random&limit=24&censored=false&kind=tv,movie,ova';
    // Поиск по Kodik (публичный эндпоинт, не требует токена)
    const KODIK_SEARCH_URL = 'https://kodikapi.com/search?token=30e42d58e6f4c6b27c6b48c5af715ed2&title=';

    // ---------- DOM элементы ----------
    const playerContainer = document.getElementById('playerContainer');
    const placeholder = document.getElementById('playerPlaceholder');
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const animeGrid = document.getElementById('animeGrid');
    const burgerToggle = document.getElementById('burgerToggle');
    const menuPanel = document.getElementById('menuPanel');
    let currentIframe = null;

    // ---------- ПЛЕЕР ----------
    // Загружает видео в плеер по ссылке на страницу Kodik
    function loadKodikPlayer(animeUrl) {
      if (currentIframe) {
        currentIframe.remove();
        currentIframe = null;
      }
      if (placeholder) placeholder.style.display = 'none';

      const iframe = document.createElement('iframe');
      iframe.src = animeUrl;
      iframe.allow = "autoplay; fullscreen; encrypted-media";
      iframe.allowFullscreen = true;
      iframe.title = "Kodik Player";
      iframe.setAttribute('sandbox', 'allow-same-origin allow-scripts allow-popups allow-forms allow-presentation');
      playerContainer.appendChild(iframe);
      currentIframe = iframe;
      playerContainer.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function resetPlayer() {
      if (currentIframe) {
        currentIframe.remove();
        currentIframe = null;
      }
      if (placeholder) placeholder.style.display = 'flex';
    }

    // Главная функция поиска: по названию находит ссылку на Kodik и запускает плеер
    async function searchAndPlay(title) {
      if (!title.trim()) {
        alert('Введите название аниме.');
        return;
      }
      try {
        const query = encodeURIComponent(title.trim());
        const response = await fetch(`${KODIK_SEARCH_URL}${query}`);
        if (!response.ok) throw new Error('Ошибка поиска');
        const data = await response.json();
        if (data.results && data.results.length > 0) {
          // Берём первый результат (обычно самый релевантный)
          const firstResult = data.results[0];
          // Формируем ссылку на страницу плеера
          const playerUrl = `https://kodik.info/${firstResult.type}/${firstResult.id}/720p`;
          loadKodikPlayer(playerUrl);
        } else {
          alert('Ничего не найдено. Попробуйте другое название или проверьте, что сервис Kodik доступен.');
        }
      } catch (err) {
        console.error('Ошибка при поиске:', err);
        alert('Не удалось выполнить поиск. Возможно, Kodik API временно недоступен.');
      }
    }

    // ---------- БУРГЕР-МЕНЮ ----------
    burgerToggle.addEventListener('click', (e) => {
      e.stopPropagation();
      menuPanel.classList.toggle('active');
    });
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.burger-menu')) menuPanel.classList.remove('active');
    });

    // ---------- КАРТОЧКИ (загрузка, отображение, клик) ----------
    async function loadRandomAnime() {
      try {
        const response = await fetch(SHIKIMORI_API);
        if (!response.ok) throw new Error('Ошибка загрузки каталога');
        const animeList = await response.json();
        renderCards(animeList);
      } catch (err) {
        console.error('Ошибка при получении каталога:', err);
        // Фолбэк, если API Shikimori недоступен
        const fallback = [
          { name: 'Наруто', russian: 'Наруто', score: '8.2', poster: null },
          { name: 'Ван-Пис', russian: 'Ван-Пис', score: '8.5', poster: null },
          { name: 'Атака титанов', russian: 'Атака титанов', score: '8.7', poster: null }
        ];
        renderCards(fallback);
      }
    }

    function renderCards(animeList) {
      animeGrid.innerHTML = '';
      animeList.forEach((anime, index) => {
        const title = anime.russian || anime.name || 'Без названия';
        const score = anime.score ? `★ ${anime.score}` : 'озвучка';
        const posterUrl = anime.poster?.originalUrl || anime.poster?.mainUrl || '';

        const card = document.createElement('div');
        card.className = 'anime-card';
        card.style.animationDelay = `${index * 0.03}s`;
        card.innerHTML = `
          <div class="card-poster" style="background-image: url('${posterUrl}');">
            ${!posterUrl ? '🎬' : ''}
          </div>
          <div class="card-title">${title}</div>
          <div class="card-meta">${score}</div>
        `;
        card.addEventListener('click', () => {
          // При клике на карточку сразу ищем и запускаем
          searchInput.value = title;
          searchAndPlay(title);
        });
        animeGrid.appendChild(card);
      });
    }

    // Функция "Случайное аниме" из меню
    window.randomAnime = () => {
      const cards = document.querySelectorAll('.anime-card');
      if (cards.length > 0) {
        const randomCard = cards[Math.floor(Math.random() * cards.length)];
        randomCard.scrollIntoView({ behavior: 'smooth' });
        randomCard.click();
      }
    };

    // ---------- ОБРАБОТЧИКИ СОБЫТИЙ ----------
    searchBtn.addEventListener('click', () => searchAndPlay(searchInput.value));
    searchInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') searchAndPlay(searchInput.value);
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        resetPlayer();
        searchInput.value = '';
      }
    });

    // Автоматическая загрузка каталога при открытии страницы
    loadRandomAnime();

    // Обновление каталога каждые 20 минут
    setInterval(loadRandomAnime, 20 * 60 * 1000);
  })();
</script>
</body>
</html>
