<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vastum — Смотри аниме</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#060810;--surface:#0d1120;--surface2:#141828;--border:rgba(120,160,255,0.12);--accent:#4f8eff;--accent2:#e8436a;--accent3:#b06bff;--text:#e8eeff;--muted:#7080a0;}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;font-size:15px;min-height:100vh;overflow-x:hidden;}

header{position:sticky;top:0;z-index:200;display:flex;align-items:center;gap:16px;padding:0 24px;height:60px;background:rgba(6,8,16,0.93);backdrop-filter:blur(18px);border-bottom:1px solid var(--border);}
.burger{width:36px;height:36px;display:flex;flex-direction:column;justify-content:center;gap:5px;cursor:pointer;border:none;background:none;padding:5px;border-radius:6px;flex-shrink:0;}
.burger:hover{background:rgba(79,142,255,0.1);}
.burger span{display:block;height:2px;width:100%;background:var(--text);border-radius:2px;}
.logo{font-family:'Cinzel',serif;font-size:22px;font-weight:900;letter-spacing:4px;text-decoration:none;flex-shrink:0;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo em{font-style:normal;-webkit-text-fill-color:var(--accent2);}

.search-wrap{flex:1;max-width:440px;margin-left:auto;position:relative;}
.search-wrap input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:14px;padding:8px 38px 8px 14px;outline:none;transition:border-color .2s,box-shadow .2s;}
.search-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,142,255,.13);}
.search-wrap input::placeholder{color:var(--muted);}
.search-wrap .sico{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;}
.search-results{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:0 16px 48px rgba(0,0,0,.65);display:none;z-index:400;}
.search-results.show{display:block;}
.sr-item{display:flex;align-items:center;gap:12px;padding:10px 14px;cursor:pointer;transition:background .15s;border-bottom:1px solid var(--border);}
.sr-item:last-child{border-bottom:none;}
.sr-item:hover{background:rgba(79,142,255,.08);}
.sr-emoji{font-size:22px;flex-shrink:0;}
.sr-title{font-size:14px;font-weight:700;}
.sr-title mark{background:rgba(79,142,255,.28);color:var(--text);border-radius:2px;padding:0 2px;}
.sr-meta{font-size:11px;color:var(--muted);}
.sr-empty{padding:16px;color:var(--muted);font-size:13px;text-align:center;}

.sb-overlay{position:fixed;inset:0;z-index:250;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .3s;}
.sb-overlay.open{opacity:1;pointer-events:all;}
.sidebar{position:fixed;left:0;top:0;bottom:0;z-index:251;width:268px;background:var(--surface);border-right:1px solid var(--border);transform:translateX(-100%);transition:transform .35s ease;display:flex;flex-direction:column;}
.sidebar.open{transform:translateX(0);}
.sb-head{padding:20px 24px 18px;border-bottom:1px solid var(--border);font-family:'Cinzel',serif;font-size:19px;font-weight:900;letter-spacing:4px;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.sidebar nav{padding:10px 0;flex:1;}
.sidebar nav a{display:flex;align-items:center;gap:12px;padding:12px 24px;color:var(--muted);text-decoration:none;font-size:15px;font-weight:600;letter-spacing:.4px;transition:color .18s,background .18s;border-left:3px solid transparent;}
.sidebar nav a:hover,.sidebar nav a.active{color:var(--text);background:rgba(79,142,255,.07);border-left-color:var(--accent);}
.sb-foot{padding:14px 24px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);}

main{position:relative;z-index:1;}

.hero{position:relative;overflow:hidden;height:460px;display:flex;align-items:flex-end;padding:0 48px 44px;background:linear-gradient(135deg,#090c1a,#0d0818);}
.hero-glow{position:absolute;inset:0;background:radial-gradient(ellipse 75% 55% at 68% 38%,rgba(79,142,255,.2),transparent),radial-gradient(ellipse 45% 55% at 18% 68%,rgba(176,107,255,.14),transparent);}
.hero-deco{position:absolute;right:72px;top:0;bottom:0;width:360px;display:flex;align-items:center;justify-content:center;font-size:240px;line-height:1;opacity:.14;user-select:none;pointer-events:none;}
.hero-content{position:relative;z-index:2;max-width:520px;}
.hero-badge{display:inline-block;margin-bottom:10px;padding:3px 12px;border-radius:20px;background:rgba(232,67,106,.18);border:1px solid rgba(232,67,106,.35);font-size:11px;font-weight:700;letter-spacing:2px;color:var(--accent2);text-transform:uppercase;}
.hero h1{font-family:'Cinzel',serif;font-size:40px;font-weight:900;line-height:1.1;margin-bottom:12px;text-shadow:0 0 36px rgba(79,142,255,.45);}
.hero p{color:var(--muted);font-size:14px;line-height:1.65;margin-bottom:22px;max-width:400px;}
.hero-btns{display:flex;gap:10px;}
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 22px;border-radius:8px;border:none;cursor:pointer;font-family:inherit;font-size:14px;font-weight:700;letter-spacing:.4px;transition:all .2s;text-decoration:none;}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;box-shadow:0 4px 18px rgba(79,142,255,.38);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 26px rgba(79,142,255,.52);}
.btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}

.section{padding:36px 28px;}
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.sec-title{font-family:'Cinzel',serif;font-size:16px;font-weight:700;letter-spacing:2px;text-transform:uppercase;display:flex;align-items:center;gap:9px;}
.sec-title::before{content:'';display:block;width:4px;height:18px;background:linear-gradient(180deg,var(--accent),var(--accent3));border-radius:2px;}
.see-all{font-size:13px;color:var(--accent);text-decoration:none;font-weight:600;}
.see-all:hover{text-decoration:underline;}
.filters{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:20px;}
.fbtn{padding:5px 15px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:all .18s;}
.fbtn:hover,.fbtn.active{border-color:var(--accent);color:var(--text);background:rgba(79,142,255,.1);}

.anime-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:16px;}
.anime-card{cursor:pointer;border-radius:10px;overflow:hidden;background:var(--surface);border:1px solid var(--border);transition:transform .2s,box-shadow .2s,border-color .2s;position:relative;}
.anime-card:hover{transform:translateY(-5px) scale(1.013);box-shadow:0 12px 34px rgba(0,0,0,.5),0 0 0 1px var(--accent);border-color:var(--accent);}
.anime-card:hover .cplay{opacity:1;}
.cposter{aspect-ratio:2/3;width:100%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:60px;position:relative;overflow:hidden;}
.cposter::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 50%,rgba(6,8,16,.9) 100%);}
.cplay{position:absolute;inset:0;z-index:2;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;background:rgba(0,0,0,.4);}
.cbadge{position:absolute;top:8px;right:8px;z-index:3;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.4px;}
.badge-new{background:var(--accent2);color:#fff;}
.badge-top{background:rgba(255,200,0,.9);color:#000;}
.cep{position:absolute;bottom:8px;left:8px;z-index:3;font-size:10px;font-weight:700;color:rgba(255,255,255,.75);background:rgba(0,0,0,.55);padding:2px 6px;border-radius:4px;}
.cinfo{padding:9px 11px 11px;}
.ctitle{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;}
.cmeta{font-size:11px;color:var(--muted);display:flex;gap:7px;}
.no-results{grid-column:1/-1;text-align:center;padding:48px 0;color:var(--muted);font-size:15px;}
.no-results span{font-size:36px;display:block;margin-bottom:10px;}

.player-page{display:none;}
.player-wrap{padding:20px 28px 80px;}
.pback{display:inline-flex;align-items:center;gap:7px;margin-bottom:18px;color:var(--muted);cursor:pointer;font-size:14px;font-weight:600;border:none;background:none;font-family:inherit;transition:color .18s;}
.pback:hover{color:var(--accent);}
.player-layout{display:grid;grid-template-columns:1fr 300px;gap:24px;}
@media(max-width:860px){.player-layout{grid-template-columns:1fr;}}

/* СТИЛИ ДЛЯ ВСТРОЕННОГО ВИДЕОПЛЕЕРА */
.video-container{width:100%;background:#000;border-radius:12px;overflow:hidden;border:1px solid var(--border);box-shadow:0 8px 36px rgba(0,0,0,.55);position:relative;}
video{width:100%;display:block;background:#000;max-height:70vh;}
.video-controls{display:flex;align-items:center;gap:12px;padding:10px 16px;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);border-top:1px solid var(--border);flex-wrap:wrap;}
.ctrl-btn{background:none;border:none;color:var(--text);cursor:pointer;font-size:18px;display:inline-flex;align-items:center;gap:6px;padding:5px 8px;border-radius:6px;transition:background .15s;}
.ctrl-btn:hover{background:rgba(255,255,255,.1);}
.progress-wrap{flex:3;min-width:120px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;cursor:pointer;position:relative;}
.progress-fill{height:100%;width:0%;background:var(--accent);border-radius:2px;position:relative;}
.time{font-size:12px;color:var(--muted);font-family:monospace;}
.volume-wrap{display:flex;align-items:center;gap:6px;}
input[type="range"]{width:80px;background:rgba(255,255,255,.2);height:3px;border-radius:2px;-webkit-appearance:none;}
input[type="range"]:focus{outline:none;}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:var(--accent);cursor:pointer;}
.quality-select{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:5px;padding:5px 8px;font-size:12px;font-family:inherit;cursor:pointer;}

.dub-sel{margin-top:14px;}
.dub-label{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
.dub-tabs{display:flex;flex-wrap:wrap;gap:7px;}
.dtab{padding:6px 15px;border-radius:20px;cursor:pointer;font-size:13px;font-weight:600;border:1px solid var(--border);background:var(--surface2);color:var(--muted);transition:all .18s;font-family:inherit;}
.dtab:hover{border-color:var(--accent);color:var(--accent);}
.dtab.active{background:rgba(79,142,255,.15);border-color:var(--accent);color:var(--text);}

.ep-head{font-size:12px;font-weight:700;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:10px;}
.ep-list{display:flex;flex-direction:column;gap:5px;max-height:520px;overflow-y:auto;padding-right:3px;}
.ep-list::-webkit-scrollbar{width:3px;}
.ep-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.ep-item{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;transition:all .18s;}
.ep-item:hover,.ep-item.active{border-color:var(--accent);background:rgba(79,142,255,.07);}
.ep-num{font-size:11px;font-weight:700;color:var(--muted);min-width:22px;}
.ep-name{font-size:13px;font-weight:600;flex:1;}
.ep-dur{font-size:11px;color:var(--muted);}

.ainfo{margin-top:20px;padding:18px;background:var(--surface);border:1px solid var(--border);border-radius:12px;}
.ainfo-rating{display:inline-flex;align-items:center;gap:4px;font-size:20px;font-weight:700;color:#ffd700;margin-bottom:7px;}
.ainfo-rating span{font-size:13px;color:var(--muted);font-weight:400;}
.ainfo-title{font-family:'Cinzel',serif;font-size:19px;font-weight:700;margin-bottom:8px;}
.ainfo-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.tag{padding:3px 9px;border-radius:4px;font-size:10px;font-weight:700;background:var(--surface2);border:1px solid var(--border);color:var(--muted);}
.ainfo-desc{font-size:13px;line-height:1.7;color:var(--muted);}

.npbar{position:fixed;bottom:0;left:0;right:0;z-index:100;height:50px;background:rgba(13,17,32,.96);backdrop-filter:blur(14px);border-top:1px solid var(--border);display:none;align-items:center;padding:0 22px;gap:12px;}
.npbar.vis{display:flex;}
.npb-emoji{font-size:22px;}
.npb-info{flex:1;}
.npb-title{font-size:13px;font-weight:700;}
.npb-sub{font-size:11px;color:var(--muted);}
.npb-bar{flex:2;height:3px;background:rgba(255,255,255,.12);border-radius:2px;}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.fu{animation:fadeUp .4s ease both;}
</style>
</head>
<body>

<header>
  <button class="burger" id="burgerBtn" aria-label="Меню">
    <span></span><span></span><span></span>
  </button>
  <a href="#" class="logo" onclick="showHome();return false;">VAST<em>UM</em></a>

  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Поиск" autocomplete="off"
      oninput="onSearch(this.value)"
      onfocus="if(this.value.trim())onSearch(this.value)"
      onblur="setTimeout(()=>document.getElementById('searchResults').classList.remove('show'),180)">
    <svg class="sico" width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <div class="search-results" id="searchResults"></div>
  </div>
</header>

<div class="sb-overlay" id="sbOverlay" onclick="closeSidebar()"></div>
<div class="sidebar" id="sidebar">
  <div class="sb-head">VASTUM</div>
  <nav>
    <a href="#" class="active" onclick="showHome();closeSidebar();return false;">
      <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Главная</a>
    <a href="#" onclick="showSection('catalog');closeSidebar();return false;">
      <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Каталог</a>
    <a href="#" onclick="closeSidebar();return false;">
      <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>Топ аниме</a>
    <a href="#" onclick="closeSidebar();return false;">
      <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>Избранное</a>
    <a href="#" onclick="closeSidebar();return false;">
      <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Онгоинги</a>
  </nav>
  <div class="sb-foot">© 2025 Vastum</div>
</div>

<main>
  <div id="homePage">
    <div class="hero">
      <div class="hero-glow"></div>
      <div class="hero-deco">⛩</div>
      <div class="hero-content fu">
        <div class="hero-badge">🔥 Новый сезон</div>
        <h1>Demon Slayer:<br>Kimetsu no Yaiba</h1>
        <p>Танджиро Камадо стал охотником на демонов после трагедии с семьёй. Теперь он должен спасти сестру-демона.</p>
        <div class="hero-btns">
          <button class="btn btn-primary" onclick="openPlayer(0)">
            <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>Смотреть
          </button>
          <button class="btn btn-ghost" onclick="openPlayer(0)">Подробнее</button>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="sec-header">
        <div class="sec-title">Популярное</div>
        <a class="see-all" href="#" onclick="return false;">Все →</a>
      </div>
      <div class="filters" id="filterBtns">
        <button class="fbtn active" onclick="setFilter(this,'all')">Все</button>
        <button class="fbtn" onclick="setFilter(this,'action')">Экшн</button>
        <button class="fbtn" onclick="setFilter(this,'romance')">Романтика</button>
        <button class="fbtn" onclick="setFilter(this,'fantasy')">Фэнтези</button>
        <button class="fbtn" onclick="setFilter(this,'horror')">Хоррор</button>
        <button class="fbtn" onclick="setFilter(this,'comedy')">Комедия</button>
      </div>
      <div class="anime-grid" id="animeGrid"></div>
    </div>
  </div>

  <div class="player-page" id="playerPage">
    <div class="player-wrap">
      <button class="pback" onclick="showHome()">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>Назад
      </button>
      <div class="player-layout">
        <div>
          <div class="video-container">
            <video id="animeVideo" controlslist="nodownload" preload="metadata">
              <source id="videoSource" src="" type="video/mp4">
              Ваш браузер не поддерживает видео.
            </video>
            <div class="video-controls">
              <button class="ctrl-btn" id="playPauseBtn">▶</button>
              <div class="progress-wrap" id="progressWrap">
                <div class="progress-fill" id="progressFill"></div>
              </div>
              <span class="time" id="timeDisplay">0:00 / 0:00</span>
              <div class="volume-wrap">
                <button class="ctrl-btn" id="volumeBtn">🔊</button>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="0.8">
              </div>
              <select id="qualitySelect" class="quality-select" style="display:none;">
                <option value="auto">Авто</option>
              </select>
              <button class="ctrl-btn" id="fullscreenBtn">⛶</button>
            </div>
          </div>
          <div class="dub-sel">
            <div class="dub-label">Озвучка / Качество</div>
            <div class="dub-tabs" id="dubTabs"></div>
          </div>
          <div class="ainfo" id="ainfo"></div>
        </div>
        <div class="ep-side">
          <div class="ep-head">Серии</div>
          <div class="ep-list" id="epList"></div>
        </div>
      </div>
    </div>
  </div>
</main>

<div class="npbar" id="npbar">
  <div class="npb-emoji" id="npbEmoji">🎌</div>
  <div class="npb-info">
    <div class="npb-title" id="npbTitle">–</div>
    <div class="npb-sub" id="npbSub">–</div>
  </div>
  <div class="npb-bar"></div>
</div>

<script>
/* ══════════ ДАННЫЕ АНИМЕ (ДОБАВЬ СВОИ ВИДЕОССЫЛКИ) ══════════ */
const ANIME = [
  {id:0, title:'Demon Slayer',        emoji:'🗡️',year:2019,genre:['action','fantasy'],eps:26, rating:9.0,badge:'top',
   desc:'Танджиро Камадо становится охотником на демонов после гибели семьи. Он должен вернуть человеческий облик сестре.',
   videoUrl: 'https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4'},  // тестовое видео
  {id:1, title:'Attack on Titan',     emoji:'🏰',year:2013,genre:['action','horror'],  eps:88, rating:9.1,badge:'top',
   desc:'Человечество выживает за огромными стенами, защищающими от гигантских людоедов. Эрен клянётся уничтожить их всех.',
   videoUrl: 'https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerFunflies.mp4'},
  {id:2, title:'My Hero Academia',    emoji:'🦸',year:2016,genre:['action','fantasy'], eps:138,rating:8.4,badge:'new',

/* ══════════ СОСТОЯНИЕ ПЛЕЕРА ══════════ */
let curAnime = null;
let curEp = 0;
let curDub = "original";   // заглушка для озвучек, можно расширить
let videoPlayer = null;
let videoSource = null;

/* ══════════ САЙДБАР ══════════ */
document.getElementById('burgerBtn').onclick = () => {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sbOverlay').classList.toggle('open');
};
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sbOverlay').classList.remove('open');
}

/* ══════════ ПОИСК ══════════ */
function hl(text, q) {
  const i = text.toLowerCase().indexOf(q);
  if (i < 0) return text;
  return text.slice(0, i) + `<mark>${text.slice(i, i+q.length)}</mark>` + text.slice(i + q.length);
}
function onSearch(val) {
  const q = val.trim().toLowerCase();
  const box = document.getElementById('searchResults');
  if (!q) {
    box.innerHTML = '';
    box.classList.remove('show');
    resetHomeGrid();
    return;
  }
  const hits = ANIME.filter(a => a.title.toLowerCase().includes(q));
  if (!hits.length) {
    box.innerHTML = '<div class="sr-empty">Ничего не найдено 😔</div>';
  } else {
    box.innerHTML = hits.slice(0, 6).map(a => `
      <div class="sr-item" onmousedown="openPlayer(${a.id})">
        <div class="sr-emoji">${a.emoji}</div>
        <div><div class="sr-title">${hl(a.title, q)}</div><div class="sr-meta">⭐ ${a.rating} · ${a.year} · ${a.eps} эп.</div></div>
      </div>`).join('');
  }
  box.classList.add('show');
}

/* ══════════ ГРИД ══════════ */
function renderGrid(list) {
  const g = document.getElementById('animeGrid');
  if (!list.length) { g.innerHTML = '<div class="no-results"><span>🔍</span>Ничего не найдено</div>'; return; }
  g.innerHTML = list.map((a, i) => `
    <div class="anime-card fu" onclick="openPlayer(${a.id})" style="animation-delay:${i*0.04}s">
      ${a.badge ? `<div class="cbadge badge-${a.badge==='new'?'new':'top'}">${a.badge==='new'?'НОВИНКА':'ТОП'}</div>` : ''}
      <div class="cposter" style="background:linear-gradient(135deg,hsl(${a.id*30},38%,11%),hsl(${a.id*30+60},48%,7%))">
        <span style="position:relative;z-index:1">${a.emoji}</span>
        <div class="cplay"><svg width="40" height="40" fill="white" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>
        <div class="cep">${a.eps} эп.</div>
      </div>
      <div class="cinfo">
        <div class="ctitle">${a.title}</div>
        <div class="cmeta"><span>⭐${a.rating}</span><span>${a.year}</span></div>
      </div>
    </div>`).join('');
}
let curFilter = 'all';
function setFilter(btn, genre) {
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  curFilter = genre;
  resetHomeGrid();
}
function resetHomeGrid() {
  const filtered = ANIME.filter(a => (curFilter === 'all' || a.genre.includes(curFilter)));
  renderGrid(filtered);
}

/* ══════════ НАВИГАЦИЯ ══════════ */
function showHome() {
  document.getElementById('homePage').style.display = '';
  document.getElementById('playerPage').style.display = 'none';
  document.getElementById('npbar').classList.remove('vis');
  // останавливаем видео, чтобы не фонило
  if (videoPlayer) {
    videoPlayer.pause();
    videoPlayer.src = '';
  }
}

function showSection(s) { showHome(); if (s === 'catalog') setTimeout(() => document.querySelector('.section').scrollIntoView({ behavior: 'smooth' }), 100); }

/* ══════════ СВОЙ ВСТРОЕННЫЙ ПЛЕЕР (HTML5) ══════════ */
function initPlayerControls() {
  videoPlayer = document.getElementById('animeVideo');
  videoSource = document.getElementById('videoSource');
  const playPauseBtn = document.getElementById('playPauseBtn');
  const progressWrap = document.getElementById('progressWrap');
  const progressFill = document.getElementById('progressFill');
  const timeDisplay = document.getElementById('timeDisplay');
  const volumeSlider = document.getElementById('volumeSlider');
  const volumeBtn = document.getElementById('volumeBtn');
  const fullscreenBtn = document.getElementById('fullscreenBtn');

  // Play/Pause
  playPauseBtn.onclick = () => {
    if (videoPlayer.paused) videoPlayer.play();
    else videoPlayer.pause();
  };
  videoPlayer.onplay = () => playPauseBtn.textContent = '⏸';
  videoPlayer.onpause = () => playPauseBtn.textContent = '▶';
  // Обновление прогресса
  videoPlayer.ontimeupdate = () => {
    const percent = (videoPlayer.currentTime / videoPlayer.duration) * 100;
    progressFill.style.width = percent + '%';
    const format = (t) => {
      const m = Math.floor(t / 60);
      const s = Math.floor(t % 60);
      return `${m}:${s<10?'0'+s:s}`;
    };
    timeDisplay.textContent = `${format(videoPlayer.currentTime)} / ${format(videoPlayer.duration || 0)}`;
  };
  // Клик по прогрессу
  progressWrap.onclick = (e) => {
    const rect = progressWrap.getBoundingClientRect();
    const pos = (e.clientX - rect.left) / rect.width;
    videoPlayer.currentTime = pos * videoPlayer.duration;
  };
  // Громкость
  volumeSlider.oninput = () => {
    videoPlayer.volume = volumeSlider.value;
    volumeBtn.textContent = videoPlayer.volume === 0 ? '🔇' : (videoPlayer.volume < 0.5 ? '🔉' : '🔊');
  };
  volumeBtn.onclick = () => {
    if (videoPlayer.volume > 0) {
      videoPlayer.dataset.lastVol = videoPlayer.volume;
      videoPlayer.volume = 0;
      volumeSlider.value = 0;
    } else {
      videoPlayer.volume = parseFloat(videoPlayer.dataset.lastVol || 0.8);
      volumeSlider.value = videoPlayer.volume;
    }
    volumeBtn.textContent = videoPlayer.volume === 0 ? '🔇' : '🔊';
  };
  // Fullscreen
  fullscreenBtn.onclick = () => {
    const container = document.querySelector('.video-container');
    if (!document.fullscreenElement) container.requestFullscreen();
    else document.exitFullscreen();
  };
}

// Загрузка видео (текущая серия)
function loadVideo() {
  if (!curAnime) return;
  const url = curAnime.videoUrl;
  if (!url) {
    videoPlayer.pause();
    videoSource.src = '';
    videoPlayer.load();
    alert('Для этого аниме не добавлена видео-ссылка. Вы можете указать её вручную в массиве ANIME (поле videoUrl).');
    return;
  }
  videoSource.src = url;
  videoPlayer.load();
  videoPlayer.play().catch(e => console.log('Автовоспроизведение заблокировано', e));
  // Обновляем нижний бар
  document.getElementById('npbar').classList.add('vis');
  document.getElementById('npbEmoji').textContent = curAnime.emoji;
  document.getElementById('npbTitle').textContent = curAnime.title;
  document.getElementById('npbSub').textContent = `Эпизод ${curEp+1}`;
}

/* ══════════ РЕНДЕР СПИСКА СЕРИЙ И ОЗВУЧЕК ══════════ */
function renderEps() {
  if (!curAnime) return;
  const n = Math.min(curAnime.eps, 100);
  document.getElementById('epList').innerHTML = Array.from({ length: n }, (_, i) => `
    <div class="ep-item ${i === curEp ? 'active' : ''}" onclick="selectEp(${i})">
      <span class="ep-num">${i+1}</span><span class="ep-name">Эпизод ${i+1}</span><span class="ep-dur">24 мин</span>
    </div>`).join('');
}
function selectEp(i) {
  curEp = i;
  renderEps();
  loadVideo();   // перезагружаем видео (в текущей реализации видео одно на всё аниме, но можно потом расширить до разных ссылок на серии)
}

// Озвучки: просто заглушка, но можно расширить, добавив в ANIME массив videoUrls
function renderDubs() {
  const container = document.getElementById('dubTabs');
  // Если есть несколько озвучек – можно добавить переключатель, но для простоты оставим одну
  container.innerHTML = `<button class="dtab active" onclick="selectDub('original')">Оригинал + субтитры</button>`;
}
function selectDub(id) {
  curDub = id;
  renderDubs();
  loadVideo(); // при смене озвучки можно подставить другой URL, если есть
}

function renderInfo() {
  if (!curAnime) return;
  const a = curAnime;
  document.getElementById('ainfo').innerHTML = `
    <div class="ainfo-rating">⭐${a.rating}<span>/10</span></div>
    <div class="ainfo-title">${a.title}</div>
    <div class="ainfo-tags"><span class="tag">${a.year}</span><span class="tag">${a.eps} эп.</span>${a.genre.map(g => `<span class="tag">${g}</span>`).join('')}</div>
    <div class="ainfo-desc">${a.desc}</div>`;
}

/* ══════════ ОТКРЫТИЕ ПЛЕЕРА ══════════ */
function openPlayer(id, ep = 0) {
  curAnime = ANIME.find(a => a.id === id);
  curEp = ep;
  document.getElementById('homePage').style.display = 'none';
  document.getElementById('playerPage').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
  renderEps();
  renderInfo();
  renderDubs();
  loadVideo();
}

/* ══════════ ИНИЦИАЛИЗАЦИЯ ══════════ */
window.onload = () => {
  resetHomeGrid();
  document.getElementById('playerPage').style.display = 'none';
  initPlayerControls();
};
</script>
