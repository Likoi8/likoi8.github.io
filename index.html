<main>

        <button class="fbtn" onclick="setFilter(this,'action')">Экшн</button>
        <button class="fbtn" onclick="setFilter(this,'romance')">Романтика</button>
        <button class="fbtn" onclick="setFilter(this,'fantasy')">Фэнтези</button>

      </div>

</main>

<div class="npbar" id="npbar">

  <div class="npb-info">
    <div class="npb-title" id="npbTitle">–</div>
    <div class="npb-sub" id="npbSub">–</div>
  </div>
  <div class="npb-bar"></div>
</div>

<script>
/* ══ SAKURA (без изменений, только на главной) ══ */
(function(){
  const c=document.getElementById('sakura'),ctx=c.getContext('2d');
  let W,H,P=[],animId=null;
  function resize(){W=c.width=innerWidth;H=c.height=innerHeight;}
  resize();addEventListener('resize',resize);
  const COLS=['#ffb7c5','#ff8fab','#ffc0cb','#ff9db5','#ffd6e0','#ffccd5'];
  function np(){return{
    x:Math.random()*W, y:-20,
    r:3+Math.random()*5,
    rot:Math.random()*Math.PI*2,
    rs:(Math.random()-.5)*.035,
    sp:.25+Math.random()*.55,
    sa:.4+Math.random()*1.6,
    sf:.004+Math.random()*.008,
    t:Math.random()*1000,
    col:COLS[Math.floor(Math.random()*COLS.length)],
    op:.35+Math.random()*.4
  };}
  for(let i=0;i<18;i++){const p=np();p.y=Math.random()*H;P.push(p);}
  function dp(p){
    ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.globalAlpha=p.op;
    ctx.beginPath();
    ctx.moveTo(0,-p.r);ctx.bezierCurveTo(p.r*.85,-p.r*.5,p.r*.85,p.r*.5,0,p.r);
    ctx.bezierCurveTo(-p.r*.85,p.r*.5,-p.r*.85,-p.r*.5,0,-p.r);
    ctx.fillStyle=p.col;ctx.fill();
    ctx.beginPath();ctx.moveTo(0,-p.r*.8);ctx.lineTo(0,p.r*.8);
    ctx.strokeStyle='rgba(255,255,255,.18)';ctx.lineWidth=.6;ctx.stroke();
    ctx.restore();
  }
  function loop(){
    if(!c.style.display||c.style.display==='none'){animId=requestAnimationFrame(loop);return;}
    ctx.clearRect(0,0,W,H);
    for(const p of P){
      p.t++;p.y+=p.sp;p.x+=Math.sin(p.t*p.sf)*p.sa;p.rot+=p.rs;dp(p);
      if(p.y>H+30){const n=np();Object.assign(p,n);p.x=Math.random()*W;}
    }
    animId=requestAnimationFrame(loop);
  }
  loop();
  window.sakuraShow=function(){c.style.display='';};
  window.sakuraHide=function(){c.style.display='none';};
})();

/* ══ ДАННЫЕ АНИМЕ (без изменений) ══ */
const ANIME=[
  {id:0, title:'Demon Slayer',        emoji:'🗡️',year:2019,genre:['action','fantasy'],eps:26, rating:9.0,badge:'top',
   desc:'Танджиро Камадо становится охотником на демонов после гибели семьи. Он должен вернуть человеческий облик сестре.'},
  {id:1, title:'Attack on Titan',     emoji:'🏰',year:2013,genre:['action','horror'],  eps:88, rating:9.1,badge:'top',
   desc:'Человечество выживает за огромными стенами, защищающими от гигантских людоедов. Эрен клянётся уничтожить их всех.'},
  {id:2, title:'My Hero Academia',    emoji:'🦸',year:2016,genre:['action','fantasy'], eps:138,rating:8.4,badge:'new',
   desc:'В мире супергероев мальчик без сил мечтает стать величайшим из них благодаря легендарной способности All Might.'},
  {id:3, title:'Fullmetal Alchemist', emoji:'⚗️',year:2009,genre:['action','fantasy'], eps:64, rating:9.2,badge:'top',
   desc:'Братья-алхимики ищут Философский камень, чтобы вернуть потерянные тела. Одно из величайших аниме всех времён.'},
  {id:4, title:'Sword Art Online',    emoji:'⚔️',year:2012,genre:['action','romance','fantasy'],eps:96,rating:7.8,badge:null,
   desc:'Тысячи игроков заперты в виртуальной реальности. Кирито должен пройти игру, чтобы выжить.'},
  {id:5, title:'Your Lie in April',   emoji:'🎹',year:2014,genre:['romance'],          eps:22, rating:9.0,badge:'top',
   desc:'Пианист потерял слух после смерти матери. Встреча со скрипачкой возвращает ему музыку и смысл жизни.'},
  {id:6, title:'Tokyo Ghoul',         emoji:'👁️',year:2014,genre:['horror','action'],  eps:48, rating:8.0,badge:null,
   desc:'Студент превращается в наполовину гуля после нападения и балансирует между двумя мирами.'},
  {id:7, title:'Re:Zero',             emoji:'⏱️',year:2016,genre:['fantasy','horror'], eps:50, rating:8.9,badge:'new',
   desc:'Субару попадает в другой мир с единственной способностью — воскрешаться после смерти и начинать заново.'},
  {id:8, title:'Kaguya-sama',         emoji:'💕',year:2019,genre:['romance','comedy'], eps:37, rating:8.9,badge:'new',
   desc:'Два гения влюблены, но никто не хочет признаваться первым. Психологическая война любви.'},
  {id:9, title:'Hunter x Hunter',     emoji:'🎯',year:2011,genre:['action','fantasy'], eps:148,rating:9.1,badge:'top',
   desc:'Гон Фрикс хочет стать охотником и найти пропавшего отца. Один из величайших приключенческих аниме.'},
  {id:10,title:'Naruto Shippuden',    emoji:'🍥',year:2007,genre:['action','fantasy'], eps:500,rating:8.7,badge:null,
   desc:'Наруто продолжает путь к мечте стать Хокаге и спасти друга Саске от тьмы.'},
  {id:11,title:'Death Note',          emoji:'📓',year:2006,genre:['horror','action'],  eps:37, rating:9.0,badge:'top',
   desc:'Гений Лайт Ягами находит тетрадь смерти и решает очистить мир от преступников, становясь богом.'},
];

/* ══ СОСТОЯНИЕ ПЛЕЕРА ══ */
let curAnime=null, curEp=0, curDub=null, curFilter='all';
let currentReleaseData=null; // кеш данных релиза (весь объект /v3/releases)
let playerVoices=[];         // массив озвучек

/* ══ SIDEBAR (без изменений) ══ */
document.getElementById('burgerBtn').onclick=()=>{
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sbOverlay').classList.toggle('open');
};
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sbOverlay').classList.remove('open');
}

/* ══ ПОИСК И GRID (без изменений) ══ */
function hl(text,q){
  const i=text.toLowerCase().indexOf(q);
  if(i<0)return text;
  return text.slice(0,i)+`<mark style="background:rgba(79,142,255,.28);color:var(--text);border-radius:2px">${text.slice(i,i+q.length)}</mark>`+text.slice(i+q.length);
}
function onSearch(val){
  const q=val.trim().toLowerCase();
  const box=document.getElementById('searchResults');
  const gridHits=ANIME.filter(a=>(!q||a.title.toLowerCase().includes(q))&&(curFilter==='all'||a.genre.includes(curFilter)));
  renderGrid(gridHits);
  if(!q){box.innerHTML='';box.classList.remove('show');return;}
  const hits=ANIME.filter(a=>a.title.toLowerCase().includes(q));
  if(!hits.length){
    box.innerHTML='<div class="sr-empty">Ничего не найдено 😔</div>';
  }else{
    box.innerHTML=hits.slice(0,6).map(a=>`
      <div class="sr-item" onmousedown="openPlayer(${a.id})">
        <div class="sr-emoji">${a.emoji}</div>
        <div><div class="sr-title">${hl(a.title,q)}</div><div class="sr-meta">⭐ ${a.rating} · ${a.year} · ${a.eps} эп.</div></div>
      </div>`).join('');
  }
  box.classList.add('show');
}
function renderGrid(list){
  const g=document.getElementById('animeGrid');
  if(!list.length){g.innerHTML='<div class="no-results"><span>🔍</span>Ничего не найдено</div>';return;}
  g.innerHTML=list.map((a,i)=>`
    <div class="anime-card fu" onclick="openPlayer(${a.id})" style="animation-delay:${i*.04}s">
      ${a.badge?`<div class="cbadge badge-${a.badge==='new'?'new':'top'}">${a.badge==='new'?'НОВИНКА':'ТОП'}</div>`:''}
      <div class="cposter" style="background:linear-gradient(135deg,hsl(${a.id*30},38%,11%),hsl(${a.id*30+60},48%,7%))">
        <span style="position:relative;z-index:1">${a.emoji}</span>
        <div class="cplay"><svg width="40" height="40" fill="white" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>
        <div class="cep">${a.eps} эп.</div>
      </div>
      <div class="cinfo">
        <div class="ctitle">${a.title}</div>
        <div class="cmeta"><span>⭐${a.rating}</span><span>${a.year}</span></div>
      </div>
    </div>`).join('');
}
function setFilter(btn,genre){
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');curFilter=genre;
  renderGrid(ANIME.filter(a=>(genre==='all'||a.genre.includes(genre))));
}

/* ══ НАВИГАЦИЯ ══ */
function showHome(){
  document.getElementById('homePage').style.display='';
  document.getElementById('playerPage').style.display='none';
  document.getElementById('npbar').classList.remove('vis');
  document.getElementById('kodikFrame').src='';
  if(window.sakuraShow)sakuraShow();
}
function showSection(s){showHome();if(s==='catalog')setTimeout(()=>document.querySelector('.section').scrollIntoView({behavior:'smooth'}),100);}

/* ────────────⚠️ НОВОЕ: ИНТЕГРАЦИЯ С ANILIBRIA API V3 ──────────── */

// 1. Поиск релиза по названию
async function searchAnilibria(title){
  const url = `https://api.anilibria.tv/v3/search?q=${encodeURIComponent(title)}`;
  const resp = await fetch(url);
  if(!resp.ok) throw new Error('Ошибка поиска');
  const data = await resp.json();
  if(!data.releases || data.releases.length===0) throw new Error('Аниме не найдено');
  // Возвращаем первый подходящий (можно сравнить год, но для примера сойдет)
  return data.releases[0];
}

// 2. Получение полного релиза (с плеером)
async function getRelease(code){
  const url = `https://api.anilibria.tv/v3/releases/${code}`;
  const resp = await fetch(url);
  if(!resp.ok) throw new Error('Не удалось загрузить данные аниме');
  const data = await resp.json();
  if(!data.player) throw new Error('Плеер недоступен');
  return data;
}

// 3. Загрузка данных при открытии аниме
async function loadAnilibriaData(anime){
  try {
    const release = await searchAnilibria(anime.title);
    const full = await getRelease(release.code);
    currentReleaseData = full;
    playerVoices = full.player.voices || [];
    // Выбираем первую озвучку, если еще не выбрана
    if(!curDub && playerVoices.length>0) curDub = playerVoices[0].id;
    renderDubs();
    return full;
  } catch(e){
    alert('Ошибка: ' + e.message);
    throw e;
  }
}

// 4. Получение iframe-ссылки для конкретной озвучки и эпизода
function getAnilibriaIframeUrl(voiceId, ep){
  if(!currentReleaseData || !currentReleaseData.player) return '';
  const voice = currentReleaseData.player.voices.find(v=>v.id==voiceId);
  if(!voice || !voice.iframe_url) return '';
  // API возвращает ссылку вида https://static.anilibria.tv/player/embed.html?...
  let url = voice.iframe_url;
  // Добавляем параметр эпизода, если поддерживается (обычно плеер сам управляет сериями)
  // Но можно попробовать добавить &episode=
  if(ep!==undefined){
    if(!url.includes('?episode=')){
      url += (url.includes('?')?'&':'?') + 'episode='+(ep+1); // эпизоды с 1
    }
  }
  return url;
}

// 5. Загрузка плеера
async function loadPlayer(){
  const frame = document.getElementById('kodikFrame');
  if(!curAnime) return;
  try{
    if(!currentReleaseData) await loadAnilibriaData(curAnime);
    if(!curDub && playerVoices.length>0) curDub = playerVoices[0].id;
    const url = getAnilibriaIframeUrl(curDub, curEp);
    if(url) frame.src = url;
    else frame.src = '';
    // обновляем нижнюю панель
    document.getElementById('npbEmoji').textContent = curAnime.emoji;
    document.getElementById('npbTitle').textContent = curAnime.title;
    const voiceLabel = playerVoices.find(v=>v.id==curDub)?.title || curDub;
    document.getElementById('npbSub').textContent = `Эпизод ${curEp+1} · ${voiceLabel}`;
    document.getElementById('npbar').classList.add('vis');
  }catch(e){
    frame.src = '';
    alert('Не удалось загрузить плеер: '+e.message);
  }
}

// 6. Рендер кнопок озвучки
function renderDubs(){
  const container = document.getElementById('dubTabs');
  if(!playerVoices.length){
    container.innerHTML = '<span style="color:var(--muted)">Нет данных</span>';
    return;
  }
  container.innerHTML = playerVoices.map(v=>`
    <button class="dtab ${v.id===curDub?'active':''}" onclick="selectDub('${v.id}')">${v.title}</button>
  `).join('');
}

// 7. Выбор озвучки
function selectDub(id){
  curDub = id;
  renderDubs();
  loadPlayer(); // перезагружаем плеер с новой озвучкой
}

// 8. Рендер списка эпизодов (используем данные ANIME)
function renderEps(){
  if(!curAnime) return;
  const n = Math.min(curAnime.eps, 100); // ограничим для интерфейса
  document.getElementById('epList').innerHTML = Array.from({length:n},(_,i)=>`
    <div class="ep-item ${i===curEp?'active':''}" onclick="selectEp(${i})">
      <span class="ep-num">${i+1}</span><span class="ep-name">Эпизод ${i+1}</span><span class="ep-dur">24:00</span>
    </div>`).join('');
}
function selectEp(i){
  curEp = i;
  renderEps();
  loadPlayer();
}

// 9. Информация о тайтле
function renderInfo(){
  if(!curAnime) return;
  const a=curAnime;
  document.getElementById('ainfo').innerHTML = `
    <div class="ainfo-rating">⭐${a.rating}<span>/10</span></div>
    <div class="ainfo-title">${a.title}</div>
    <div class="ainfo-tags"><span class="tag">${a.year}</span><span class="tag">${a.eps} эп.</span>${a.genre.map(g=>`<span class="tag">${g}</span>`).join('')}</div>
    <div class="ainfo-desc">${a.desc}</div>`;
}

/* ══ ОТКРЫТИЕ ПЛЕЕРА ══ */
function openPlayer(id, ep=0){
  curAnime = ANIME.find(a=>a.id===id);
  curEp = ep;
  curDub = null;
  currentReleaseData = null;
  playerVoices = [];
  document.getElementById('homePage').style.display='none';
  document.getElementById('playerPage').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
  renderEps();
  renderInfo();
  loadPlayer();
  if(window.sakuraHide)sakuraHide();
}

/* ══ СТАРТ ══ */
renderGrid(ANIME);
document.getElementById('playerPage').style.display='none';
if(window.sakuraShow) sakuraShow();
</script>

</body>
</html>
