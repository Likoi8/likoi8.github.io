<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>Vastum – anime streaming</title>
    <script src="https://kodik.info/js/player.js" defer></script>
    <style>
        :root {
            --bg: #1a1a1f;
            --surface: #23232b;
            --surface-light: #2e2e38;
            --primary: #b8a9c9;        /* мягкий лавандовый, оставлен для второстепенных элементов */
            --accent: #d9565c;          /* красный акцент */
            --accent-glow: #f08484;
            --text: #f0eaf5;
            --text-muted: #9f95a8;
            --shadow-lg: 0 12px 32px rgba(0,0,0,0.6);
            --radius-xl: 30px;
            --radius-lg: 22px;
            --radius-md: 16px;
            --radius-sm: 12px;
            --transition: 0.25s cubic-bezier(0.2, 0, 0.3, 1);
            --font: 'Segoe UI', 'Inter', system-ui, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            font-family: var(--font);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 0 1rem 1rem;
            background-image: radial-gradient(circle at 10% 10%, rgba(217,86,92,0.1) 0%, transparent 40%),
            radial-gradient(circle at 90% 80%, rgba(184,169,201,0.1) 0%, transparent 50%);
        }

        .app {
            max-width: 1300px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1.8rem;
            position: relative;
        }

        /* ===== ШАПКА С БУРГЕРОМ ===== */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--surface);
            padding: 0.8rem 1.8rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            margin-top: 1rem;
            position: relative;
            z-index: 1000;
        }
        .logo {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #d4a0a0, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.02em;
        }
        .burger-menu {
            position: relative;
        }
        .burger-icon {
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 2rem;
            padding: 0.3rem 0.7rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
        }
        .burger-icon:hover {
            background: var(--surface-light);
            color: var(--accent-glow);
        }
        .menu-panel {
            position: absolute;
            top: 3.8rem;
            right: 0;
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 1.2rem;
            min-width: 200px;
            box-shadow: var(--shadow-lg);
            display: none;
            flex-direction: column;
            gap: 0.6rem;
            backdrop-filter: blur(8px);
            z-index: 100;
        }
        .menu-panel.active {
            display: flex;
        }
        .menu-panel a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            padding: 0.6rem 1rem;
            border-radius: var(--radius-sm);
            transition: var(--transition);
        }
        .menu-panel a:hover {
            background: var(--surface-light);
            color: var(--accent-glow);
        }

        /* ===== ПОДЗАГОЛОВОК ===== */
        .subtitle {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-muted);
            text-align: center;
            margin-top: -0.8rem;
            opacity: 0.8;
        }

        /* ===== ПАНЕЛЬ ВВОДА ===== */
        .link-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            background: var(--surface);
            padding: 0.7rem 1rem;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            align-items: center;
        }
        .link-bar input {
            flex: 2 1 250px;
            background: #1e1e26;
            border: 1px solid #3a3344;
            border-radius: var(--radius-md);
            padding: 0.7rem 1.2rem;
            font-size: 0.95rem;
            color: var(--text);
            outline: none;
        }
        .link-bar input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(217,86,92,0.3);
        }
        .link-bar button {
            background: linear-gradient(135deg, #b04d4d, var(--accent));
            border: none;
            color: white;
            font-weight: 600;
            padding: 0.7rem 1.6rem;
            border-radius: var(--radius-md);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: var(--transition);
            box-shadow: 0 4px 12px rgba(217,86,92,0.5);
        }
        .link-bar button:hover {
            background: linear-gradient(135deg, #c26767, #e87a7a);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(217,86,92,0.6);
        }

        /* ===== ПЛЕЕР ===== */
        .player-section {
            background: #101014;
            border-radius: var(--radius-xl);
            overflow: hidden;
            aspect-ratio: 16 / 9;
            width: 100%;
            box-shadow: var(--shadow-lg), 0 0 0 1px rgba(217,86,92,0.3);
        }
        .player-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #e0b3b3;
            text-align: center;
            gap: 1rem;
            background: radial-gradient(circle at center, #2a2530 0%, #101014 100%);
        }

        /* ===== КАРУСЕЛЬ ===== */
        .carousel-section {
            margin-top: 0.5rem;
        }
        .carousel-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        .carousel-title::before {
            content: "▹";
            color: var(--accent);
            font-weight: bold;
        }
        .carousel-container {
            position: relative;
            display: flex;
            align-items: center;
        }
        .carousel-track {
            display: flex;
            gap: 1.3rem;
            overflow-x: auto;
            scroll-behavior: smooth;
            padding: 0.5rem 0.2rem 1rem;
            scrollbar-width: thin;
            scrollbar-color: #5c3f3f #1e1e26;
        }
        .carousel-track::-webkit-scrollbar {
            height: 6px;
        }
        .carousel-track::-webkit-scrollbar-thumb {
            background: #854848;
            border-radius: 8px;
        }

        .anime-card {
            flex: 0 0 170px;
            background: var(--surface-light);
            border-radius: var(--radius-lg);
            padding: 0.8rem;
            box-shadow: 0 6px 16px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            opacity: 0;
            transform: translateY(25px);
            animation: fadeSlideIn 0.5s ease forwards;
            border: 1px solid transparent;
        }
        .anime-card:hover {
            transform: translateY(-6px);
            border-color: var(--accent);
            background: #322d37;
        }
        @keyframes fadeSlideIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .card-poster {
            width: 100%;
            aspect-ratio: 2/3;
            background: #2b2733;
            border-radius: var(--radius-sm);
            margin-bottom: 0.7rem;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: #7a5b5b;
        }
        .card-title {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text);
        }
        .card-meta {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 0.2rem;
        }

        .carousel-btn {
            background: rgba(35,35,43,0.95);
            border: none;
            color: var(--text);
            font-size: 2rem;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            backdrop-filter: blur(6px);
            transition: var(--transition);
            position: absolute;
            top: 35%;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .carousel-btn:hover {
            background: var(--accent);
            color: white;
        }
        .carousel-btn.left { left: -15px; }
        .carousel-btn.right { right: -15px; }

        .footer {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-muted);
            opacity: 0.7;
        }

        @media (max-width: 600px) {
            .anime-card { flex: 0 0 145px; }
            .top-bar { padding: 0.8rem 1rem; }
        }
    </style>
</head>
<body>
<div class="app">
    <!-- ШАПКА С БУРГЕРОМ -->
    <div class="top-bar">
        <div class="logo">Vastum</div>
        <div class="burger-menu">
            <button class="burger-icon" id="burgerToggle">☰</button>
            <div class="menu-panel" id="menuPanel">
                <a href="#">Главная</a>
                <a href="#">Каталог</a>
                <a href="#">Онгоинги</a>
                <a href="#">Случайное</a>
                <a href="#">О проекте</a>
            </div>
        </div>
    </div>
    <div class="subtitle">anime streaming</div>

    <!-- ПАНЕЛЬ ССЫЛКИ -->
    <div class="link-bar">
        <input type="text" id="kodikUrlInput" placeholder="Вставьте ссылку Kodik...">
        <button id="loadUrlBtn">▶ Загрузить</button>
    </div>

    <!-- ПЛЕЕР -->
    <div class="player-section" id="playerContainer">
        <div id="playerPlaceholder" class="player-placeholder">
            <span style="font-size:2.5rem;">🎬</span>
            <p>Вставьте ссылку Kodik или выберите аниме ниже</p>
        </div>
    </div>

    <!-- КАРУСЕЛЬ -->
    <div class="carousel-section">
        <h2 class="carousel-title">Популярное (русская озвучка)</h2>
        <div class="carousel-container">
            <button class="carousel-btn left" id="scrollLeft">‹</button>
            <div class="carousel-track" id="animeCarousel"></div>
            <button class="carousel-btn right" id="scrollRight">›</button>
        </div>
    </div>

    <footer class="footer">Vastum · anime streaming · плеер Kodik</footer>
</div>

<script>
    (function() {
        // ========== API AniLibria (конкретная ссылка) ==========
        const API_URL = 'https://api.anilibria.tv/v2/animeUpdates?limit=16';

        const playerContainer = document.getElementById('playerContainer');
        const placeholder = document.getElementById('playerPlaceholder');
        const urlInput = document.getElementById('kodikUrlInput');
        const loadBtn = document.getElementById('loadUrlBtn');
        const carousel = document.getElementById('animeCarousel');
        const scrollLeftBtn = document.getElementById('scrollLeft');
        const scrollRightBtn = document.getElementById('scrollRight');
        const burgerToggle = document.getElementById('burgerToggle');
        const menuPanel = document.getElementById('menuPanel');

        let currentIframe = null;

        // ---------- Плеер Kodik ----------
        function loadKodikVideo(url) {
            if (currentIframe) {
                currentIframe.remove();
                currentIframe = null;
            }
            if (placeholder) placeholder.style.display = 'none';
            const iframe = document.createElement('iframe');
            iframe.src = url;
            iframe.allow = "autoplay; fullscreen; encrypted-media";
            iframe.allowFullscreen = true;
            iframe.title = "Kodik Player";
            iframe.setAttribute('sandbox', 'allow-same-origin allow-scripts allow-popups allow-forms allow-presentation');
            playerContainer.appendChild(iframe);
            currentIframe = iframe;
        }

        function resetPlayer() {
            if (currentIframe) {
                currentIframe.remove();
                currentIframe = null;
            }
            if (placeholder) placeholder.style.display = 'flex';
        }

        loadBtn.addEventListener('click', () => {
            const raw = urlInput.value.trim();
            if (!raw || !raw.includes('kodik.')) {
                alert('Вставьте корректную ссылку Kodik (например, https://kodik.info/serial/...)');
                return;
            }
            loadKodikVideo(raw);
            urlInput.value = '';
        });
        urlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loadBtn.click();
        });

        // ---------- Бургер-меню ----------
        burgerToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            menuPanel.classList.toggle('active');
        });
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.burger-menu')) {
                menuPanel.classList.remove('active');
            }
        });

        // ---------- Карусель с анимацией ----------
        function renderAnimeCards(animeArray) {
            carousel.innerHTML = '';
            animeArray.forEach((anime, index) => {
                const card = document.createElement('div');
                card.className = 'anime-card';
                card.style.animationDelay = `${index * 0.05}s`;

                const posterUrl = anime.posters?.original?.url || anime.posters?.medium?.url || '';
                const posterDiv = document.createElement('div');
                posterDiv.className = 'card-poster';
                if (posterUrl) {
                    posterDiv.style.backgroundImage = `url(${posterUrl})`;
                    posterDiv.style.backgroundSize = 'cover';
                } else {
                    posterDiv.innerHTML = '🎬';
                }

                const title = document.createElement('div');
                title.className = 'card-title';
                title.textContent = anime.names?.ru || anime.names?.en || 'Без названия';

                const meta = document.createElement('div');
                meta.className = 'card-meta';
                meta.textContent = `${anime.season || ''} ${anime.year || ''}`.trim() || 'озвучка';

                card.appendChild(posterDiv);
                card.appendChild(title);
                card.appendChild(meta);

                card.addEventListener('click', () => {
                    const searchName = encodeURIComponent(anime.names?.ru || anime.names?.en || '');
                    alert(`Для просмотра нужен Kodik API.\nПоиск: ${anime.names?.ru || anime.names?.en}`);
                    urlInput.value = `https://kodik.info/search?title=${searchName}`;
                });

                carousel.appendChild(card);
            });
        }

        // Загрузка из API
        async function fetchAnimeUpdates() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('Ошибка сети');
                const data = await response.json();
                const list = data?.list || data || [];
                if (list.length > 0) {
                    renderAnimeCards(list.slice(0, 16));
                } else {
                    useFallback();
                }
            } catch (err) {
                console.warn('API AniLibria недоступен, используем локальный список.', err);
                useFallback();
            }
        }

        function useFallback() {
            const fallback = [
                { names: { ru: 'Ван-Пис' }, season: 'осень', year: 1999 },
                { names: { ru: 'Магическая битва' }, season: 'осень', year: 2020 },
                { names: { ru: 'Клинок, рассекающий демонов' }, season: 'весна', year: 2019 },
                { names: { ru: 'Атака титанов' }, season: 'весна', year: 2013 },
                { names: { ru: 'Семья шпиона' }, season: 'весна', year: 2022 },
                { names: { ru: 'Тетрадь смерти' }, season: 'осень', year: 2006 },
                { names: { ru: 'Наруто' }, season: 'осень', year: 2002 },
                { names: { ru: 'Стальной алхимик' }, season: 'весна', year: 2009 },
                { names: { ru: 'Моя геройская академия' }, season: 'весна', year: 2016 },
                { names: { ru: 'Вайолет Эвергарден' }, season: 'зима', year: 2018 },
                { names: { ru: 'Токийский гуль' }, season: 'лето', year: 2014 },
            ];
            renderAnimeCards(fallback.slice(0, 12));
        }

        // Автообновление раз в 30 минут
        fetchAnimeUpdates();
        setInterval(fetchAnimeUpdates, 30 * 60 * 1000);

        // Прокрутка карусели
        function scrollCarousel(direction) {
            const scrollAmount = 320;
            carousel.scrollBy({
                left: direction === 'left' ? -scrollAmount : scrollAmount,
                behavior: 'smooth'
            });
        }
        scrollLeftBtn.addEventListener('click', () => scrollCarousel('left'));
        scrollRightBtn.addEventListener('click', () => scrollCarousel('right'));

        // Поддержка мыши для перетаскивания
        let isDown = false, startX, scrollLeftPos;
        carousel.addEventListener('mousedown', (e) => {
            isDown = true;
            startX = e.pageX - carousel.offsetLeft;
            scrollLeftPos = carousel.scrollLeft;
            carousel.style.cursor = 'grabbing';
        });
        carousel.addEventListener('mouseleave', () => { isDown = false; carousel.style.cursor = ''; });
        carousel.addEventListener('mouseup', () => { isDown = false; carousel.style.cursor = ''; });
        carousel.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.pageX - carousel.offsetLeft;
            const walk = (x - startX) * 2;
            carousel.scrollLeft = scrollLeftPos - walk;
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') resetPlayer();
        });
    })();
</script>
</body>
</html>
